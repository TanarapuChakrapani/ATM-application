<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-statement</title>
    <link rel="icon" href="https://www.shutterstock.com/image-vector/atm-symbol-button-sign-vector-600nw-2407755695.jpg">
</head>
<style>
    *{
        margin: 0;
        font-family: sans-serif;
    }
    h1{
        text-transform: uppercase;
        text-align: center;
        color: white;
        margin-bottom: 300px;
    }
    section{
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    div{
        display: flex;
        justify-content: space-around;
        width: 100vw;
    }
    table{
        border-color: black;
        background-color: yellow;
        color: red;
    }
    table tr,td{
        padding: 40px;
    }

</style>
<body style="background-color: #151357;">
    <section>
        <h1>Mini-statement</h1>
        <div>
            <table border="2px" cellspacing="0px">
            <tr>
                <th>Deposite Amount</th>
                <th>Deposite Time</th>
            </tr>
            {% for i in Deposite_statement_info %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
            </tr>
            {% endfor %}
        </table>
        <table border="2px" cellspacing="0px">
            <tr>
                <th>Withdraw Amount</th>
                <th>Withdraw Time</th>
            </tr>
            {% for j in Withdraw_statement_info %}
            <tr>
                <td>{{j[0]}}</td>
                <td>{{j[1]}}</td>
            </tr>
            {% endfor %}
        </table>
        </div>
    </section>
</body>
</html>
